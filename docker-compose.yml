version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: bluecarbon_db
    environment:
      POSTGRES_DB: bluecarbon
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bluecarbon_redis
    ports:
      - "6379:6379"

  hardhat:
    image: node:18-alpine
    container_name: bluecarbon_hardhat
    working_dir: /app
    volumes:
      - ./smart-contract:/app
    ports:
      - "8545:8545"
    command: sh -c "npm install && npx hardhat node --hostname 0.0.0.0"

  deploy-contracts:
    image: node:18-alpine
    container_name: bluecarbon_contract_deployer
    working_dir: /app
    volumes:
      - .:/app
    depends_on:
      - hardhat
    command: sh -c "sleep 8 && cd smart-contract && npx hardhat run scripts/deploy.js --network localhost"

  backend:
    build: ./backend
    container_name: bluecarbon_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/bluecarbon
      - REDIS_URL=redis://redis:6379/0
      - RPC_URL=http://hardhat:8545
      - MOCK_MODE=True
    depends_on:
      - db
      - redis
      - hardhat
      - deploy-contracts

  celery_worker:
    build: ./backend
    container_name: bluecarbon_worker
    command: celery -A app.tasks.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/bluecarbon
      - REDIS_URL=redis://redis:6379/0
      - RPC_URL=http://hardhat:8545
      - MOCK_MODE=True
    depends_on:
      - db
      - redis
      - hardhat
      - deploy-contracts

  frontend:
    image: node:18-alpine
    container_name: bluecarbon_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend

volumes:
  pgdata:
